name: Deploy to Heroku

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Heroku Container Registry
        run: |
          echo "${{ secrets.HEROKU_API_KEY }}" | docker login --username=_ --password-stdin registry.heroku.com

      - name: Build Docker image
        run: docker build -t registry.heroku.com/diabetes-predicton/web .

      - name: Push Docker image to Heroku
        run: docker push registry.heroku.com/diabetes-predicton/web

      - name: Release the image on Heroku
        run: |
          curl -n -X PATCH https://api.heroku.com/apps/diabetes-predicton/formation \
          -H "Content-Type: application/json" \
          -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
          -H "Authorization: Bearer ${{ secrets.HEROKU_API_KEY }}" \
          -d '{"updates":[{"type":"web","docker_image":"registry.heroku.com/diabetes-predicton/web"}]}'